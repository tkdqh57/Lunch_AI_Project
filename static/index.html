<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? | AI 인공지능 메뉴 추천 서비스</title>
    <meta name="description" content="결정 장애 해결! 날씨와 기분에 맞춰 AI가 최적의 메뉴를 추천해 드립니다.">
    <meta property="og:title" content="오늘 뭐 먹지? AI 메뉴 추천">
    <meta property="og:description" content="인공지능이 골라주는 오늘의 인생 메뉴를 확인해보세요!">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fff5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: #ff6b6b; margin-bottom: 25px; font-weight: 900; }

        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #444; font-size: 14px; }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe3e3;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        select:focus, input[type="text"]:focus {
            border-color: #ff6b6b;
            background-color: #fffafb;
        }

        button.main-btn {
            width: 100%;
            padding: 16px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }
        button.main-btn:hover { background-color: #ee5253; transform: translateY(-2px); }
        button.main-btn:active { transform: translateY(0); }

        /* 결과창 스타일 */
        #result-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 18px;
            background-color: #fff9f9;
            border-left: 6px solid #ff6b6b;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-title {
            font-size: 1.35em;
            font-weight: 900;
            color: #d63031;
            margin-bottom: 10px;
            display: block;
        }
        .menu-desc {
            font-size: 1em;
            line-height: 1.6;
            color: #444;
        }

        /* 댓글 섹션 */
        .feedback-section { margin-top: 40px; border-top: 2px dashed #ffe3e3; padding-top: 20px; }
        .feedback-input-wrapper { display: flex; gap: 8px; margin-bottom: 15px; }
        #feedback-list { list-style: none; padding: 0; text-align: left; max-height: 150px; overflow-y: auto; }
        .feedback-item { background: #fdfdfd; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍴 오늘 뭐 먹지?</h1>

    <div class="input-group">
        <label>👤 성별</label>
        <select id="gender">
            <option value="선택안함">선택안함</option>
            <option value="남성">남성</option>
            <option value="여성">여성</option>
        </select>
    </div>

    <div class="input-group">
        <label>☀️ 현재 날씨</label>
        <select id="weather">
            <option value="맑음">☀️ 맑음</option>
            <option value="비">☔ 비</option>
            <option value="눈">❄️ 눈</option>
            <option value="흐림">☁️ 흐림</option>
            <option value="폭염">🔥 폭염</option>
            <option value="한파">🥶 한파</option>
        </select>
    </div>

    <div class="input-group">
        <label>🌈 나의 기분</label>
        <select id="mood">
            <option value="행복함">😊 행복함</option>
            <option value="우울함">😢 우울함</option>
            <option value="피곤함">😴 피곤함</option>
            <option value="배고픔">😋 배고픔</option>
            <option value="다이어트 중">🥗 다이어트 중</option>
            <option value="운동 완료! (단백질필요)">💪 운동 완료!</option>
        </select>
    </div>

    <div class="input-group">
        <label>👥 누구와 함께인가요?</label>
        <select id="with_whom">
            <option value="혼자">🙋 혼자</option>
            <option value="연인">👩‍❤️‍👨 연인</option>
            <option value="친구">👬 친구</option>
            <option value="직장동료">💼 직장동료</option>
            <option value="가족">👨‍👩‍👧 가족</option>
        </select>
    </div>

    <div class="input-group">
        <label>✍️ 추가 요청 사항 (자유입력)</label>
        <input type="text" id="additional_request" placeholder="예: 매콤한 면 요리, 가벼운 샐러드 등">
    </div>

    <button class="main-btn" onclick="getRecommendation()">AI 추천받기 ✨</button>

    <div id="result-container">
        <div id="result"></div>
    </div>

    <div class="feedback-section">
        <h3>💬 유저 한마디</h3>
        <div class="feedback-input-wrapper">
            <input type="text" id="feedback-input" placeholder="후기를 남겨주세요!" style="flex: 1;">
            <button onclick="sendFeedback()" style="padding: 10px 15px; border-radius: 10px; border: none; background: #555; color: white; cursor: pointer;">등록</button>
        </div>
        <ul id="feedback-list"></ul>
    </div>
</div>

<script>
    async function getRecommendation() {
        const gender = document.getElementById('gender').value;
        const weather = document.getElementById('weather').value;
        const mood = document.getElementById('mood').value;
        const withWhom = document.getElementById('with_whom').value;
        const additionalRequest = document.getElementById('additional_request').value;

        const resultContainer = document.getElementById('result-container');
        const resultDiv = document.getElementById('result');

        resultDiv.innerHTML = "🤔 AI 셰프가 고민하고 있습니다...";
        resultContainer.style.display = "block";

        try {
            // 한글 포함을 위해 encodeURIComponent 처리
            const params = new URLSearchParams({
                gender, weather, mood, with_whom: withWhom, additional_request: additionalRequest
            });

            const response = await fetch(`/ai-recommend?${params.toString()}`);
            const data = await response.json();

            let rawText = data.recommendation;

            // 1. 마크다운 기호 제거 (##, **)
            let cleanText = rawText.replace(/## /g, '').replace(/\*\*/g, '').trim();

            // 2. 제목과 설명 분리 (첫 줄 추출)
            const lines = cleanText.split('\n');
            const menuName = lines[0];
            const description = lines.slice(1).join('<br>').trim();

            // 3. 화면에 적용
            resultDiv.innerHTML = `
                <span class="menu-title">✨ AI 친구의 제안: ${menuName}</span>
                <div class="menu-desc">${description}</div>
            `;
        } catch (error) {
            resultDiv.innerHTML = "❌ 추천을 가져오지 못했습니다. 잠시 후 다시 시도해 주세요.";
        }
    }

    async function sendFeedback() {
        const input = document.getElementById('feedback-input');
        if (!input.value) return;

        await fetch('/feedback', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: input.value})
        });
        input.value = '';
        loadFeedbacks();
    }

    async function loadFeedbacks() {
        try {
            const response = await fetch('/feedbacks');
            const feedbacks = await response.json();
            const list = document.getElementById('feedback-list');
            list.innerHTML = feedbacks.slice(-10).reverse().map(f => `<li class="feedback-item">${f.content}</li>`).join('');
        } catch(e) {}
    }

    loadFeedbacks();
</script>

</body>
</html>
